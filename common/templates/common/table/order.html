{% extends 'common/base.html' %}
{% load static waiter_filters %}
{% block title %}My Orders | Waiter{% endblock %}

{% block extra_head %}
<style>
  :root {
    --primary-gradient: linear-gradient(135deg, #4f46e5, #7c3aed);
    --surface-glass: rgba(255, 255, 255, 0.9);
  }

  body { background: #f8fafc; color: #1e293b; font-family: 'Inter', system-ui, sans-serif; }

  /* ── Header ── */
  .order-header {
    background: var(--surface-glass);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(0,0,0,0.05);
    padding: 0.85rem 0;
    position: sticky;
    top: 0;
    z-index: 1020;
  }

  .restaurant-name { font-size: 1.1rem; font-weight: 800; color: #0f172a; }

  /* ── Grid ── */
  .custom-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
  }

  @media (max-width: 1200px) { .custom-grid { grid-template-columns: repeat(3, 1fr); } }
  @media (max-width: 992px) { .custom-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 576px) { .custom-grid { grid-template-columns: 1fr; } }

  /* ── CARD FIXED ── */
  .modern-card {
    background: #fff;
    border-radius: 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.06);
    transition: all 0.25s ease;
    display: flex;
    flex-direction: column;
    height: 320px; /* ✅ FIXED HEIGHT */
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.02);
  }

  .modern-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 14px 28px rgba(0,0,0,0.1);
  }

  .card-head { padding: 16px; cursor: pointer; }

  .o-num {
    width: 32px; height: 32px; 
    background: var(--primary-gradient);
    color: #fff; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75rem; font-weight: 800;
  }

  .o-title { font-size: 0.95rem; font-weight: 700; color: #1e293b; margin-top: 10px; }
  .o-sub { font-size: 0.7rem; color: #64748b; }
  .o-total { font-size: 1rem; font-weight: 800; color: #4f46e5; }

  /* ── Status Pills ── */
  .s-pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 10px; border-radius: 8px;
    font-size: 0.65rem; font-weight: 800; text-transform: uppercase;
  }

  .s-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .s-pill.PENDING   { background: #fff7ed; color: #c2410c; }
  .s-pill.ACCEPTED  { background: #f0fdf4; color: #15803d; }
  .s-pill.REJECTED  { background: #fef2f2; color: #dc2626; }
  .s-pill.MAKING    { background: #fefce8; color: #854d0e; }
  .s-pill.COMPLETED { background: #f5f3ff; color: #6d28d9; }

  /* ── SCROLL FIX ── */
  .card-body-items { 
    background: #fcfdfe; 
    border-top: 1px solid #f1f5f9; 
    padding: 16px;
    flex-grow: 1;
    overflow-y: auto;   /* ✅ scroll */
    min-height: 0;      /* ✅ critical fix */
  }

  .card-body-items::-webkit-scrollbar { width: 4px; }
  .card-body-items::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

  .item-list-container {
    display: flex;
    flex-direction: column;
  }

  .item-line {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 12px; font-size: 0.8rem;
  }

  .item-name { font-weight: 600; color: #334155; line-height: 1.2; }

  .live-pulse {
    width: 8px; height: 8px; background: #10b981;
    border-radius: 50%; display: inline-block;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
    70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
    100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
  }

  .chev { transition: transform 0.2s ease; }
  .chev.open { transform: rotate(180deg); }
</style>
{% endblock %}
