{% extends 'common/base.html' %}
{% block title %}Item | Waiter{% endblock %}
{% block content %}
{% include 'common/partials/user_navbar.html' %}
<div class="container py-4">
  <h2>{% if item %}Edit{% else %}Add{% endif %} Item - {{ category.name }}</h2>
  <form method="post" action="{% url 'common:menu-item-form' category.uid %}{% if item %}?item_uid={{ item.uid }}{% endif %}">
    {% csrf_token %}
    <input type="hidden" name="uid" value="{{ item.uid|default:'' }}">
    <div class="row g-2">
      <div class="col-md-6"><input type="text" name="name" class="form-control" value="{{ item.name|default:'' }}" placeholder="Name" required></div>
      <div class="col-md-6"><select name="menu_type" class="form-select">{% for val, label in menu_type_choices %}<option value="{{ val }}" {% if item.menu_type == val %}selected{% endif %}>{{ label }}</option>{% endfor %}</select></div>
      <div class="col-md-6"><input type="number" step="0.01" name="full_price" class="form-control" value="{{ item.full_price|default:'' }}" placeholder="Full price" required></div>
      <div class="col-md-6"><input type="number" step="0.01" name="half_price" class="form-control" value="{{ item.half_price|default:'' }}" placeholder="Half price"></div>
      <div class="col-12"><textarea name="description" class="form-control" placeholder="Description">{{ item.description|default:'' }}</textarea></div>
      <div class="col-12"><textarea name="ingredients" class="form-control" placeholder="Ingredients">{{ item.ingredients|default:'' }}</textarea></div>
      <div class="col-12"><label><input type="checkbox" name="available" value="True" {% if not item or item.available %}checked{% endif %}> Available</label></div>
    </div>
    <button type="submit" class="btn btn-primary mt-3">Save</button>
  </form>
</div>
{% endblock %}
